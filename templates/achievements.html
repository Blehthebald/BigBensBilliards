{% extends 'layout.html' %}
{% block content %}
<div style="text-align: center; margin-bottom: 2rem;">
    <h2 style="color: #ffcc00; font-size: 2.5rem;">🏆 The Trophy Room</h2>
    <p style="color: #8892b0; max-width: 600px; margin: 0 auto;">
        A complete list of every achievement available in the Garden Pool League. Hit the tables and start unlocking!
    </p>
</div>

<div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
    {% for a in achievements %}
    <div class="card" style="border-left: 5px solid #4CAF50; display: flex; align-items: center; padding: 15px;">
        <div style="font-size: 3rem; margin-right: 20px; text-shadow: 2px 2px 5px rgba(0,0,0,0.5);">
            {{ a.icon }}
        </div>
        <div>
            <h4 style="margin: 0; color: #d1e8ff;">{{ a.name }}</h4>
            <p style="margin: 0; color: #8892b0; font-size: 0.95rem;">{{ a.desc }}</p>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
