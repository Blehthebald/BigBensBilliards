<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>God Mode - Login</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d0d0d; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #1a1a1a; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); text-align: center; border: 1px solid #333; width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #00e676; }
        input[type="password"] { padding: 12px; width: 90%; margin: 20px 0; border: 1px solid #444; border-radius: 6px; background: #2c2c2c; color: white; outline: none; }
        input[type="password"]:focus { border-color: #00e676; }
        button { background: #00e676; color: #000; border: none; padding: 12px 20px; cursor: pointer; border-radius: 6px; font-weight: bold; width: 100%; font-size: 1em; transition: background 0.2s; }
        button:hover { background: #00c853; }
        .flash { color: #ff5252; margin-bottom: 15px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>⚡ God Mode</h2>
        <p style="color: #888; font-size: 0.9em;">System Administrator Access</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="password" name="password" placeholder="Enter Master Password" required>
            <button type="submit">Initialize Override</button>
        </form>
    </div>
</body>
</html>
