{% extends 'layout.html' %}
{% block content %}
<div style="text-align: center; padding: 10vh 20px;">
    <h1 style="
        font-family: 'Georgia', serif; 
        font-size: 6rem; 
        color: #4CAF50; 
        text-shadow: 4px 4px 0px #5c4033, 6px 6px 0px #3e2723; 
        margin-bottom: 0;
        line-height: 1;
    ">
        404
    </h1>
    
    <h2 style="color: #ffcc00; margin-top: 1rem;">Lost in the Weeds! 🌿</h2>
    
    <p style="font-size: 1.2rem; color: #8892b0; max-width: 600px; margin: 0 auto 2rem auto;">
        It looks like this player has wandered off the garden path, or their account has been permanently pruned from the league. 
    </p>
    
    <a href="/" role="button" style="
        background-color: #4CAF50; 
        border-color: #3e2723; 
        color: white; 
        font-weight: bold; 
        padding: 10px 30px; 
        border-radius: 5px;
    ">
        Return to the Greenhouse
    </a>
</div>
{% endblock %}
